<script>
document.getElementById("shipmentForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const result = document.getElementById("result");
  result.innerHTML = " Processing...";

  const sender = document.getElementById("sender").value;
  const receiver = document.getElementById("receiver").value;
  const address = document.getElementById("address").value;
  const weight = document.getElementById("weight").value;

  try {
    const res = await fetch("https://buka-courier.onrender.com/api/shipments", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ sender, receiver, address, weight })
    });

    const text = await res.text();

    // Try parsing JSON safely
    let data;
    try {
      data = JSON.parse(text);
    } catch {
      throw new Error("Invalid server response");
    }

    result.innerHTML = `
       Shipment Created <br><br>
       Tracking ID: <strong>${data.trackingID}</strong>
    `;
  } catch (err) {
    result.innerHTML = " Server is waking up or blocked. Try again in 10 seconds.";
  }
});
</script>
