<!DOCTYPE html>
<html>
<head>
  <title>Buka Express Courier</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Buka Express</h1>
  <nav>
    <a href="#">Home</a>
    <a href="track.html">Track</a>
  </nav>
</header>

<section class="hero">
  <h2>Fast & Reliable Delivery Across Nigeria</h2>
</section>

<section class="form-section">
  <h2>Send a Package</h2>

  <form id="shipmentForm">
    <input type="text" placeholder="Sender Name" id="sender" required><br>
    <input type="text" placeholder="Receiver Name" id="receiver" required><br>
    <input type="text" placeholder="Pickup Location" id="pickup" required><br>
    <input type="text" placeholder="Destination" id="destination" required><br>
    <input type="number" placeholder="Weight (kg)" id="weight" required><br>

    <button type="submit">Book Shipment</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
