<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BukaCourier</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <h2>BukaCourier</h2>
  <button onclick="scrollToTrack()">Track</button>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Fast & Reliable Delivery</h1>
  <p>Ship packages anywhere with speed and confidence</p>
  <button onclick="scrollToTrack()">Track Shipment</button>
</section>

<!-- BOOK SHIPMENT -->
<section class="card">
  <h2>Book Shipment</h2>

  <input id="sender" placeholder="Sender Name">
  <input id="receiver" placeholder="Receiver Name">
  <input id="pickup" placeholder="Pickup Location">
  <input id="destination" placeholder="Destination">
  <input id="weight" placeholder="Weight">

  <button onclick="createShipment()">Submit</button>
</section>

<!-- TRACK -->
<section class="card" id="track">
  <h2>Track Shipment</h2>

  <input id="trackId" placeholder="Enter Tracking ID">
  <button onclick="trackShipment()">Track</button>

  <div id="result"></div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 BukaCourier. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
